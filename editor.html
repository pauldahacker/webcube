<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webcube track editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Faster+One&family=Iceberg&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/editor.css" />
  </head>
  <body>
    <div id="editor">
      <div id="toolbar">
        <div class="tool-group">
          <span class="hint">Click empty space to add a point &middot; drag a point to move it &middot; select + Delete to remove &middot; scroll or middle/right-drag to pan &middot; pinch or ctrl/&#8984;+scroll to zoom &middot; ctrl/&#8984;+Z undo</span>
        </div>
        <div class="tool-group">
          <label><input id="closed-loop" type="checkbox" /> Closed loop</label>
          <button id="new-track">New track</button>
        </div>
        <div class="tool-group">
          <button id="zoom-out" title="Zoom out">&minus;</button>
          <button id="zoom-in" title="Zoom in">+</button>
          <button id="fit-view">Fit view</button>
        </div>
        <div class="tool-group">
          <label class="file-label">Load JSON <input id="load" type="file" accept="application/json" /></label>
          <button id="export">Export JSON</button>
          <button id="preview-3d">Preview in 3D</button>
        </div>
      </div>
      <div id="body">
        <div id="canvas-wrap">
          <canvas id="grid"></canvas>
        </div>
        <div id="point-panel">
          <h3>Point</h3>
          <div id="point-empty">Select a point to edit it.</div>
          <div id="point-fields" style="display: none">
            <label>Elevation <input id="pt-elevation" type="number" step="0.5" /></label>
            <label>Width <input id="pt-width" type="number" step="0.5" min="1" /></label>
            <label>Banking (deg) <input id="pt-banking" type="number" step="1" /></label>
            <label>Grip <input id="pt-grip" type="number" step="0.05" min="0.05" /></label>
            <button id="delete-point">Delete point</button>
          </div>
        </div>
      </div>
    </div>
    <div id="preview-overlay" style="display: none">
      <div id="preview-toolbar">
        <span>Drag to orbit, scroll to zoom</span>
        <button id="close-preview">Close</button>
      </div>
      <canvas id="preview-canvas"></canvas>
    </div>
    <script type="module" src="/src/editor.ts"></script>
  </body>
</html>
